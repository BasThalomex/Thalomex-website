<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Bas Huisman – engineering consultant. Mechanische conceptontwikkeling, PoC-ontwerp en mechatronische integratie via Thalomex." />
  <title>Bas Huisman – Thalomex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Nav ── -->
  <nav id="nav">
    <div class="nav-inner">

      <!-- Logo — links, statisch -->
      <a class="nav-logo" href="#hero" aria-label="Thalomex home">
        <img class="logo-white" src="logo_white.png" alt="Thalomex" />
        <img class="logo-dark"  src="logo_dark.png"  alt="Thalomex" />
      </a>

      <!-- Rechts: links + taal + hamburger -->
      <div class="nav-right">
        <ul class="nav-links" id="nav-links">
          <li><a href="#services">Diensten</a></li>
          <li><a href="#work">Werk</a></li>
          <li><a href="#about">Over mij</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="lang-switch">
          <a href="index.html">EN</a>
          <span class="lang-sep">|</span>
          <a href="nl.html" class="active">NL</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu openen" aria-expanded="false">☰</button>
      </div>

    </div>
  </nav>

  <!-- ── Zwevende contactknop ── -->
  <a class="contact-fab" href="#contact" id="contact-fab">Neem contact op →</a>

  <!-- ── Pagina-inhoud (samengesteld door JS) ── -->
  <main id="main"></main>

  <!-- ── Footer ── -->
  <footer>
    <div class="wrap footer-inner">
      <img src="logo_white.png" alt="Thalomex" />
      <span class="footer-copy">© 2026 Thalomex – Bas Huisman</span>
    </div>
  </footer>

  <!-- ── Content (bewerk js/content/nl.js voor alle tekst) ── -->
  <script src="js/content/nl.js"></script>

  <!-- ── Sectiesjablonen (alleen structuur, geen tekst) ── -->
  <script src="js/templates/hero.js"></script>
  <script src="js/templates/services.js"></script>
  <script src="js/templates/work.js"></script>
  <script src="js/templates/about.js"></script>
  <script src="js/templates/contact.js"></script>

  <!-- ── Hoofdcontroller ── -->
  <script src="js/main.js"></script>
