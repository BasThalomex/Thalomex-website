<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="version"     content="0.2.5" />
  <meta name="description" content="Bas Huisman – engineering consultant. Mechanical concept development, PoC design and mechatronic integration via Thalomex." />
  <title>Bas Huisman – Thalomex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Nav ── -->
  <nav id="nav">
    <div class="nav-inner">

      <!-- Logo — left side, static -->
      <a class="nav-logo" href="#hero" aria-label="Thalomex home">
        <img class="logo-white" src="logo_white.png" alt="Thalomex" />
        <img class="logo-dark"  src="logo_dark.png"  alt="Thalomex" />
      </a>

      <!-- Right: links + lang + hamburger -->
      <div class="nav-right">
        <ul class="nav-links" id="nav-links">
          <li><a href="#services">Services</a></li>
          <li><a href="#work">Work</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="lang-switch">
          <a href="index.html" class="active">EN</a>
          <span class="lang-sep">|</span>
          <a href="nl.html">NL</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
      </div>

    </div>
  </nav>

  <!-- ── Floating contact button ── -->
  <a class="contact-fab" href="#contact" id="contact-fab">Get in touch →</a>

  <!-- ── Page content (assembled by JS) ── -->
  <main id="main"></main>

  <!-- ── Footer ── -->
  <footer>
    <div class="wrap footer-inner">
      <img src="logo_white.png" alt="Thalomex" />
      <span class="footer-copy">© 2026 Thalomex – Bas Huisman</span>
    </div>
  </footer>

  <!-- ── Content (edit js/content/en.js to update all text) ── -->
  <script src="js/content/en.js"></script>

  <!-- ── Section templates (structure only, no text) ── -->
  <script src="js/templates/hero.js"></script>
  <script src="js/templates/services.js"></script>
  <script src="js/templates/work.js"></script>
  <script src="js/templates/about.js"></script>
  <script src="js/templates/contact.js"></script>

  <!-- ── Main controller ── -->
  <script src="js/main.js"></script>

</body>
</html>
